# This file is documentation only. Do not apply it with real values committed.
apiVersion: v1
kind: Secret
metadata:
  name: convex-test-101-runtime
  namespace: playground
type: Opaque
stringData:
  INSTANCE_SECRET: replace-with-openssl-rand-hex-32
---
apiVersion: v1
kind: Secret
metadata:
  name: convex-test-101-db-creds
  namespace: playground
type: kubernetes.io/basic-auth
stringData:
  username: convex_test_101
  password: replace-with-generated-password
  # Convex expects POSTGRES_URL without a database name.
  uri: postgresql://convex_test_101:replace-with-url-encoded-password@convex-test-101-pg-rw.playground.svc:5432
---
# Copy the generated Rook user Secret into playground and rename its keys.
apiVersion: v1
kind: Secret
metadata:
  name: convex-test-101-s3
  namespace: playground
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: replace-with-generated-access-key
  AWS_SECRET_ACCESS_KEY: replace-with-generated-secret-key
  AWS_REGION: us-east-1

