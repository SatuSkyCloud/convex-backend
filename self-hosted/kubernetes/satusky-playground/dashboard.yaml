apiVersion: apps/v1
kind: Deployment
metadata:
  name: convex-test-101-dashboard
  namespace: playground
  labels:
    app.kubernetes.io/name: convex
    app.kubernetes.io/instance: convex-test-101
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: convex
      app.kubernetes.io/instance: convex-test-101
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: convex
        app.kubernetes.io/instance: convex-test-101
        app.kubernetes.io/component: dashboard
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.satusky.com/role
                    operator: In
                    values:
                      - compute
                      - storage-compute
      containers:
        - name: dashboard
          image: ghcr.io/get-convex/convex-dashboard:9a6ee1296f10a84987f0da123c7bd9b0c3d547e3@sha256:520734abc9471e0375a883b5163ad56c657c8d504e32de2acdd8682140c8eb75
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6791
          env:
            - name: NEXT_PUBLIC_DEPLOYMENT_URL
              value: https://api-convex-test-101.satusky.com
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: convex-test-101-dashboard
  namespace: playground
  labels:
    app.kubernetes.io/name: convex
    app.kubernetes.io/instance: convex-test-101
    app.kubernetes.io/component: dashboard
spec:
  selector:
    app.kubernetes.io/name: convex
    app.kubernetes.io/instance: convex-test-101
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: 6791
      targetPort: http
